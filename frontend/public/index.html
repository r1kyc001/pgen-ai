<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGEN.ai — AI PRD Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700&display=swap">
    <style>
        :root {
            --primary: #a78bfa;
            --bg: #09090b;
            --surface: #0c0c0f;
            --border: #27272a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --success: #34d399;
        }
        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Geist', sans-serif;
            letter-spacing: -0.01em;
        }
        .surface { background-color: var(--surface); border: 1px solid var(--border); }
        .btn-primary { background-color: var(--primary); color: #000; font-weight: 500; }
        .btn-secondary { border: 1px solid var(--border); color: var(--text-primary); }
        .btn-secondary:hover { background-color: var(--border); }
        .input-field { background-color: var(--surface); border: 1px solid var(--border); color: var(--text-primary); }
        .input-field:focus { outline: 2px solid var(--primary); outline-offset: 2px; }
        h1, h2, h3 { letter-spacing: -0.02em; font-weight: 700; color: var(--text-primary); }
        code { font-family: monospace; color: var(--success); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="border-b border-[var(--border)] p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[var(--primary)] rounded flex items-center justify-center text-black">
                    <i data-lucide="zap" class="w-5 h-5"></i>
                </div>
                <span class="text-xl font-bold tracking-tighter">PGEN.ai</span>
            </div>
            <div class="flex items-center gap-4">
                <button id="btn-settings" class="btn-secondary px-3 py-1.5 rounded-md flex items-center gap-2 text-sm">
                    <i data-lucide="settings" class="w-4 h-4"></i> LLM Config
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full p-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <!-- Input & Controls -->
        <div class="lg:col-span-8 flex flex-col gap-4">
            <div class="surface p-4 rounded-lg flex flex-col gap-3">
                <label class="text-xs font-medium text-[var(--text-secondary)] uppercase tracking-widest">Ide Produk</label>
                <textarea id="idea-input" class="input-field p-4 rounded-md h-32 resize-none text-lg" placeholder="Tulis ide produkmu di sini..."></textarea>
                <div class="flex justify-end">
                    <button id="btn-generate" class="btn-primary px-6 py-2 rounded-md flex items-center gap-2">
                        <i data-lucide="sparkles" class="w-4 h-4 text-black"></i> Generate PRD
                    </button>
                </div>
            </div>

            <!-- PRD Editor Area -->
            <div class="surface rounded-lg flex-1 flex flex-col overflow-hidden">
                <div class="border-b border-[var(--border)] p-3 flex justify-between items-center bg-[var(--surface)]">
                    <span class="text-xs font-medium text-[var(--text-secondary)] uppercase tracking-widest">Editor PRD.md</span>
                    <div class="flex gap-2">
                        <button class="p-1.5 hover:bg-[var(--border)] rounded" title="Copy"><i data-lucide="copy" class="w-4 h-4"></i></button>
                        <button class="p-1.5 hover:bg-[var(--border)] rounded" title="Download"><i data-lucide="download" class="w-4 h-4"></i></button>
                    </div>
                </div>
                <textarea id="prd-editor" class="flex-1 p-6 bg-transparent resize-none focus:outline-none font-mono text-sm leading-relaxed" spellcheck="false"></textarea>
            </div>
        </div>

        <!-- Sidebar: AI Chat & Recommendations -->
        <aside class="lg:col-span-4 flex flex-col gap-6">
            <!-- Refine Chat -->
            <div class="surface rounded-lg flex flex-col h-[350px]">
                <div class="border-b border-[var(--border)] p-3 bg-[var(--surface)]">
                    <span class="text-xs font-medium text-[var(--text-secondary)] uppercase tracking-widest">Refinement Chat</span>
                </div>
                <div id="chat-messages" class="flex-1 p-4 overflow-y-auto space-y-4 text-sm text-[var(--text-secondary)]">
                    <div class="p-2 border border-[var(--border)] rounded italic">Belum ada aktivitas refinement.</div>
                </div>
                <div class="p-3 border-t border-[var(--border)] flex gap-2">
                    <input type="text" class="input-field flex-1 px-3 py-1.5 rounded text-sm" placeholder="Minta perubahan...">
                    <button class="btn-primary p-1.5 rounded"><i data-lucide="send" class="w-4 h-4 text-black"></i></button>
                </div>
            </div>

            <!-- Tech Recommendations -->
            <div class="surface rounded-lg flex flex-col">
                <div class="border-b border-[var(--border)] p-3 bg-[var(--surface)]">
                    <span class="text-xs font-medium text-[var(--text-secondary)] uppercase tracking-widest">Tech Stack Advice</span>
                </div>
                <div id="tech-advice" class="p-4 space-y-4">
                    <div class="space-y-1">
                        <div class="text-[var(--text-secondary)] text-[10px] uppercase font-bold tracking-tighter">Language</div>
                        <div class="text-sm font-medium">—</div>
                    </div>
                    <div class="space-y-1">
                        <div class="text-[var(--text-secondary)] text-[10px] uppercase font-bold tracking-tighter">Framework</div>
                        <div class="text-sm font-medium">—</div>
                    </div>
                    <div class="space-y-1">
                        <div class="text-[var(--text-secondary)] text-[10px] uppercase font-bold tracking-tighter">Structure</div>
                        <div class="p-2 bg-black rounded border border-[var(--border)] font-mono text-[10px] text-[var(--success)]">
                            waiting for generation...
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <!-- Footer -->
    <footer class="p-4 text-center text-[var(--text-secondary)] text-xs border-t border-[var(--border)]">
        PGEN.ai &copy; 2024 — Built for Vibe Coding & Agent Efficiency
    </footer>

    <!-- LLM Config Modal (Hidden) -->
    <div id="modal-config" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 hidden z-50">
        <div class="surface max-w-md w-full rounded-lg p-6 space-y-4">
            <h2 class="text-xl font-bold">LLM Configuration</h2>
            <div class="space-y-2">
                <label class="text-xs text-[var(--text-secondary)]">API Endpoint (9router)</label>
                <input id="cfg-endpoint" type="text" class="input-field w-full px-3 py-2 rounded text-sm" placeholder="https://...">
            </div>
            <div class="space-y-2">
                <label class="text-xs text-[var(--text-secondary)]">API Key</label>
                <input id="cfg-key" type="password" class="input-field w-full px-3 py-2 rounded text-sm" placeholder="Bearer ...">
            </div>
            <div class="space-y-2">
                <label class="text-xs text-[var(--text-secondary)]">Model</label>
                <input id="cfg-model" type="text" class="input-field w-full px-3 py-2 rounded text-sm" placeholder="coding">
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button id="btn-cancel-config" class="btn-secondary px-4 py-1.5 rounded text-sm">Cancel</button>
                <button id="btn-save-config" class="btn-primary px-4 py-1.5 rounded text-sm">Save Config</button>
            </div>
        </div>
    </div>

    <script>
        // Init Lucide Icons
        lucide.createIcons();

        // DOM Elements
        const modal = document.getElementById('modal-config');
        const btnSettings = document.getElementById('btn-settings');
        const btnCancel = document.getElementById('btn-cancel-config');
        const btnSave = document.getElementById('btn-save-config');
        const btnGenerate = document.getElementById('btn-generate');
        const ideaInput = document.getElementById('idea-input');
        const prdEditor = document.getElementById('prd-editor');

        // Load Config
        const loadConfig = () => ({
            endpoint: localStorage.getItem('pgen_endpoint') || '',
            api_key: localStorage.getItem('pgen_key') || '',
            model: localStorage.getItem('pgen_model') || 'coding'
        });

        btnSettings.onclick = () => {
            const cfg = loadConfig();
            document.getElementById('cfg-endpoint').value = cfg.endpoint;
            document.getElementById('cfg-key').value = cfg.api_key;
            document.getElementById('cfg-model').value = cfg.model;
            modal.classList.remove('hidden');
        };

        btnCancel.onclick = () => modal.classList.add('hidden');

        btnSave.onclick = () => {
            localStorage.setItem('pgen_endpoint', document.getElementById('cfg-endpoint').value);
            localStorage.setItem('pgen_key', document.getElementById('cfg-key').value);
            localStorage.setItem('pgen_model', document.getElementById('cfg-model').value);
            modal.classList.add('hidden');
        };

        btnGenerate.onclick = async () => {
            const idea = ideaInput.value;
            if (!idea) return alert('Tulis ide dulu!');

            const config = loadConfig();
            if (!config.endpoint) return alert('Atur LLM Config dulu!');

            btnGenerate.disabled = true;
            btnGenerate.innerText = 'Generating...';
            prdEditor.value = '';

            try {
                // In production, this hits YOUR Cloudflare Worker
                const response = await fetch('/api/generate-prd', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idea, llm_config: config })
                });

                if (!response.ok) throw new Error('Generation failed');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    // Basic parsing if 9router returns raw strings or event-stream
                    prdEditor.value += chunk;
                    prdEditor.scrollTop = prdEditor.scrollHeight;
                }
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btnGenerate.disabled = false;
                btnGenerate.innerText = 'Generate PRD';
            }
        };
    </script>
</body>
</html>
